<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>RumahDrive — Penyimpanan Keluarga</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ========== HEADER ========== -->
  <header class="app-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🏠</span>
        <span class="logo-text">RumahDrive</span>
      </div>
      <div class="storage-badge" id="storageBadge">
        <span class="storage-label">Loading…</span>
      </div>
    </div>
    <!-- Breadcrumb navigasi folder -->
    <nav class="breadcrumb" id="breadcrumb" aria-label="Lokasi folder">
      <button class="crumb active" data-path="/">📁 Beranda</button>
    </nav>
  </header>

  <!-- ========== TOOLBAR ========== -->
  <div class="toolbar">
    <button class="btn-toolbar" id="btnNewFolder" aria-label="Buat folder baru">
      <span class="btn-icon">➕</span>
      <span>Folder Baru</span>
    </button>
    <button class="btn-toolbar btn-primary" id="btnUpload" aria-label="Upload file">
      <span class="btn-icon">⬆</span>
      <span>Upload</span>
    </button>
    <input type="file" id="fileInput" multiple hidden />
    <div class="toolbar-right">
      <button class="btn-icon-only" id="btnViewToggle" title="Ganti tampilan" aria-label="Ganti tampilan">⊞</button>
      <button class="btn-icon-only" id="btnRefresh" title="Refresh" aria-label="Refresh">↺</button>
    </div>
  </div>

  <!-- ========== UPLOAD PROGRESS AREA ========== -->
  <div class="upload-progress-area" id="uploadProgressArea" hidden>
    <div class="upload-progress-header">
      <span>Mengupload…</span>
      <button id="btnCancelAll" class="cancel-btn">Tutup</button>
    </div>
    <div id="uploadProgressList"></div>
  </div>

  <!-- ========== DRAG & DROP OVERLAY ========== -->
  <div class="drop-overlay" id="dropOverlay">
    <div class="drop-message">
      <span class="drop-icon">⬆</span>
      <p>Lepas file di sini untuk upload</p>
    </div>
  </div>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="file-container" id="fileContainer">
    <!-- Skeleton loading -->
    <div class="skeleton-grid" id="skeletonGrid">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>

    <!-- File grid (diisi oleh JS) -->
    <div class="file-grid" id="fileGrid" hidden></div>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState" hidden>
      <div class="empty-icon">📂</div>
      <p class="empty-title">Folder ini kosong</p>
      <p class="empty-sub">Upload file atau buat folder baru</p>
    </div>

    <!-- Error state -->
    <div class="error-state" id="errorState" hidden>
      <div class="error-icon">⚠️</div>
      <p class="error-title">Gagal memuat file</p>
      <p class="error-sub" id="errorMessage">Pastikan server FastAPI sudah berjalan.</p>
      <button class="btn-retry" id="btnRetry">Coba Lagi</button>
    </div>
  </main>

  <!-- ========== FAB UPLOAD (mobile shortcut) ========== -->
  <button class="fab" id="fabUpload" aria-label="Upload cepat">⬆</button>

  <!-- ========== MODAL: BUAT FOLDER ========== -->
  <div class="modal-backdrop" id="modalNewFolder" role="dialog" aria-modal="true" aria-labelledby="modalFolderTitle" hidden>
    <div class="modal">
      <h2 id="modalFolderTitle" class="modal-title">Buat Folder Baru</h2>
      <input
        type="text"
        id="folderNameInput"
        class="modal-input"
        placeholder="Nama folder…"
        maxlength="120"
        autocomplete="off"
      />
      <p class="modal-hint" id="folderNameError" hidden>Nama tidak valid</p>
      <div class="modal-actions">
        <button class="btn-modal-cancel" id="btnCancelFolder">Batal</button>
        <button class="btn-modal-ok" id="btnConfirmFolder">Buat</button>
      </div>
    </div>
  </div>

  <!-- ========== MODAL: KONFIRMASI HAPUS ========== -->
  <div class="modal-backdrop" id="modalDelete" role="dialog" aria-modal="true" aria-labelledby="modalDeleteTitle" hidden>
    <div class="modal modal-danger">
      <h2 id="modalDeleteTitle" class="modal-title">Hapus Item?</h2>
      <p class="modal-body" id="deleteItemName">—</p>
      <p class="modal-hint">Tindakan ini tidak bisa dibatalkan.</p>
      <div class="modal-actions">
        <button class="btn-modal-cancel" id="btnCancelDelete">Batal</button>
        <button class="btn-modal-danger" id="btnConfirmDelete">Hapus</button>
      </div>
    </div>
  </div>

  <!-- ========== MODAL: PREVIEW FILE ========== -->
  <div class="modal-backdrop modal-fullscreen" id="modalPreview" role="dialog" aria-modal="true" hidden>
    <div class="modal modal-preview">
      <div class="preview-header">
        <span class="preview-filename" id="previewFilename">—</span>
        <button class="btn-icon-only preview-close" id="btnClosePreview" aria-label="Tutup">✕</button>
      </div>
      <div class="preview-body" id="previewBody">
        <!-- Diisi oleh JS: gambar, video, audio, iframe, atau fallback -->
      </div>
      <div class="preview-footer">
        <a class="btn-download" id="btnDownloadPreview" href="#" download>⬇ Download</a>
      </div>
    </div>
  </div>

  <!-- ========== TOAST NOTIFIKASI ========== -->
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
